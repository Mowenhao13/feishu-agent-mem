# OpenClaw 记忆系统配置（openclaw-architecture.md §5.1）
project:
  name: "Q2-core-platform"
  topics:
    - "认证模块"
    - "数据库架构"
    - "用户服务"
    - "订单服务"
  phases:
    - "需求评审"
    - "技术选型"
    - "开发"
    - "测试"
    - "上线"

lark_cli:
  bin: "/usr/local/bin/lark-cli"
  default_identity: "user"

git:
  work_dir: "./openclaw-data"
  remote: ""
  auto_push: false
  branch: "main"

bitable:
  base_token: "base_xxxxx"
  tables:
    decision: "tbl_decision"
    topic: "tbl_topic"
    phase: "tbl_phase"
    relation: "tbl_relation"

events:
  subscriptions:
    - events:
        - "im.message.receive_v1"
        - "im.message.pin"
      filter: "^oc_project_"
      handler: "direct_pipeline"
    - events:
        - "vc.meeting.meeting_ended"
      handler: "direct_pipeline"

signal:
  strong_budget: 6000
  medium_budget: 2000
  weak_budget: 500

service:
  name: "openclaw-memory"
  port: 37777
  log_level: "info"
  mcp:
    port: 37777
